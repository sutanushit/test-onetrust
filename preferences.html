<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preference Center</title>
  <style>
    :root {
        font-size: 10px;
        font-family: Arial Rounded MT for SE, Arial Rounded MT Fallback, Arial Fallback, Arial, system-ui, -apple-system, sans-serif;
    }
             .session-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #d9d9d9;
            font-size: 1.4rem;
        }

        .session-email {
            color: #222;
            word-break: break-all;
        }

        .logout-btn {
            border: 0;
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            background: #3DCD58;
            cursor: pointer;
            font-size: 1.3rem;
            margin-left: auto;
        }
  </style>
  <script>
    let userToken = localStorage.getItem('userToken');
    let userEmail = localStorage.getItem('userEmail');
    if (userEmail && userToken) {
    	var OneTrust = {
    		dataSubjectParams: {
    			id: userEmail,
    			isAnonymous: false,
                token: userToken
    		}
    	};
    }
  </script>
</head>
<body>

    <div class="session-bar">
        <div id="sessionEmail" class="session-email"><span id="userEmailText"></span></div>
        <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </div>

    
    <trust-center
    tenantId="221db9bd-276f-4f86-8e1c-53c7d470edee"
    portalId="8cc4adcd-5478-4682-9df0-cd96587dda77"
    blobUrl="https://testcomplianceportal.se.com"
    workerUrl="https://portal-api.onetrust.com"
    ></trust-center>

    <script
    src="https://testcomplianceportal.se.com/portal-trust-center/trust-center/scripts/portal-sdk.js"
    type="text/javascript"
    ></script>

    <script>
        const emailText = document.getElementById('userEmailText');
        const sessionEmail = document.getElementById('sessionEmail');
        const logoutBtn = document.getElementById('logoutBtn');
        const storedEmail = localStorage.getItem('userEmail');

        if (storedEmail) {
            emailText.textContent = 'Signed in as: ' + storedEmail;
            logoutBtn.textContent = 'Logout';
        } else {
            sessionEmail.style.display = 'none';
            logoutBtn.textContent = 'Login';
        }

        logoutBtn.addEventListener('click', function () {
            if (storedEmail) {
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userToken');
                sessionStorage.removeItem('token');
            }
            window.location.href = 'login.html';
        });
    </script>

</body>
</html>
